<!DOCTYPE html>
<html lang="en" data-theme="slate" data-mode="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cairn — Panel</title>
  <link rel="stylesheet" href="cairn/theme.css" />
  <style>
    @keyframes cairnPulse { 0% { transform: scale(1); opacity: 0.5; } 70%,100% { transform: scale(2.4); opacity: 0; } }
    @keyframes cairnSpin { to { transform: rotate(360deg); } }
    .cairn-spin { animation: cairnSpin 0.8s linear infinite; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="cairn/data.js"></script>
  <script type="text/babel" src="cairn/tweaks-panel.jsx"></script>
  <script type="text/babel" src="cairn/icons.jsx"></script>
  <script type="text/babel" src="cairn/components.jsx"></script>
  <script type="text/babel" src="cairn/shell.jsx"></script>
  <script type="text/babel" src="cairn/page-dashboard.jsx"></script>
  <script type="text/babel" src="cairn/page-corpus.jsx"></script>
  <script type="text/babel" src="cairn/page-verify.jsx"></script>
  <script type="text/babel" src="cairn/page-settings.jsx"></script>
  <script type="text/babel" src="cairn/app.jsx"></script>
</body>
</html>
